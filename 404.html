<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Página no encontrada · YU Constructores</title>
<meta name="robots" content="noindex, follow">
<meta name="author" content="Dr. Mauricio Rodríguez Herrera">
<link rel="icon" href="assets/img/brand/logo-32.png" sizes="32x32">
<link rel="stylesheet" href="assets/css/fonts.css">
<link rel="stylesheet" href="assets/css/styles.css">
<script>
  /* Respeta el tema elegido por el visitante también en la página de error */
  (function () {
    try {
      var t = localStorage.getItem('yu-theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
<style>
  .nf { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 2rem; }
  .nf__code { font-family: var(--font-display); font-size: clamp(5rem, 22vw, 12rem); line-height: .9; color: var(--brand); }
  .nf h1 { font-size: clamp(1.6rem, 4vw, 2.6rem); text-transform: uppercase; margin-block: 1rem .8rem; }
  .nf p { color: var(--ink-mut); max-width: 46ch; margin-inline: auto; margin-bottom: 2rem; }
  .nf img { width: 68px; height: 68px; margin-inline: auto; margin-bottom: 1.5rem; }
</style>
</head>
<body>
  <div class="nf">
    <div>
      <img src="assets/img/brand/logo-192.png" alt="YU Construcciones S.A.S." width="68" height="68">
      <div class="nf__code">404</div>
      <h1>Esta página no existe</h1>
      <p>El enlace que buscaba no está disponible. Regrese al inicio o escríbanos por WhatsApp y con gusto le ayudamos.</p>
      <div style="display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
        <a class="btn btn--brand" href="./">Volver al inicio</a>
        <a class="btn btn--ghost" href="https://wa.me/573046557120" target="_blank" rel="noopener">Escribir por WhatsApp</a>
      </div>
    </div>
  </div>
</body>
</html>
